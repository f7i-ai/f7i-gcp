# PR plans: base branch `dev` vs `main` selects terraform/env/{dev,prod}.{tfvars,backend.hcl}.
#
# GitHub Variables: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL.

name: Terraform GCP (PR)

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-pr.yml"

concurrency:
  group: terraform-gcp-pr-${{ github.repository }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Select env files (PR base branch)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          WS="$GITHUB_WORKSPACE"
          case "$BASE_REF" in
            main)
              echo "TF_ENV=prod" >> "$GITHUB_ENV"
              echo "TFVARS_FILE=$WS/terraform/env/prod.tfvars" >> "$GITHUB_ENV"
              echo "BACKEND_FILE=$WS/terraform/env/gcp-prod.backend.hcl" >> "$GITHUB_ENV"
              ;;
            *)
              echo "TF_ENV=dev" >> "$GITHUB_ENV"
              echo "TFVARS_FILE=$WS/terraform/env/dev.tfvars" >> "$GITHUB_ENV"
              echo "BACKEND_FILE=$WS/terraform/env/gcp-dev.backend.hcl" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Require configuration
        env:
          WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          ok=1
          [ -f "${TFVARS_FILE:-}" ] || { echo "Missing tfvars: $TFVARS_FILE"; ok=0; }
          [ -f "${BACKEND_FILE:-}" ] || { echo "Missing backend fragment: $BACKEND_FILE"; ok=0; }
          [ -n "$WIF" ] || { echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER"; ok=0; }
          [ -n "$SA" ] || { echo "Missing GCP_SERVICE_ACCOUNT_EMAIL"; ok=0; }
          [ "$ok" -eq 1 ] || exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Terraform Format (check)
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false -reconfigure -backend-config="$BACKEND_FILE"

      - name: Terraform Validate
        run: terraform validate -var-file="$TFVARS_FILE"

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=tfplan.binary -var-file="$TFVARS_FILE"

      - name: Show plan (text summary)
        run: terraform show -no-color tfplan.binary

      - name: Confirm no local state was written
        run: test ! -f terraform.tfstate && test ! -f terraform.tfstate.backup
