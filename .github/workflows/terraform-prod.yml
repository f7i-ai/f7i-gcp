name: Terraform (prod)

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "functions/**"
      - ".github/workflows/terraform-prod.yml"
  workflow_dispatch:

concurrency:
  group: terraform-prod-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: terraform-apply-prod
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - run: terraform init -input=false -reconfigure -backend-config="$GITHUB_WORKSPACE/terraform/env/gcp-prod.backend.hcl"

      - run: terraform apply -input=false -auto-approve -no-color -var-file="$GITHUB_WORKSPACE/terraform/env/prod.tfvars"
