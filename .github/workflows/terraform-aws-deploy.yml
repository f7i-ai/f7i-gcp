# ============================================================================
# TEMPORARILY DISABLED (auto-triggers) — validate GCP first. Uncomment `push` under `on:` to re-enable.
# ============================================================================
# Runs on `dev`: apply AWS Terraform using aws/terraform/env/aws-dev.backend.hcl + GitHub variable
# AWS_ROLE_ARN_DEV (full ARN to the dev role below).
#
# --- GitHub → AWS (OIDC) for the DEV account ---
# IAM OIDC provider (once per account): token.actions.githubusercontent.com, aud = sts.amazonaws.com
# IAM role trust (example; tighten sub to your repo only):
#   "Federated": "arn:aws:iam::DEV_ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com"
#   "Action": "sts:AssumeRoleWithWebIdentity"
#   "Condition": {
#     "StringEquals": { "token.actions.githubusercontent.com:aud": "sts.amazonaws.com" },
#     "StringLike": {
#       "token.actions.githubusercontent.com:sub": "repo:f7i-ai/f7i-gcp:*"
#     }
#   }
# For least privilege, replace StringLike with ForAnyValue:StringLike and list only the subs you need, e.g.:
#   repo:f7i-ai/f7i-gcp:ref:refs/heads/dev
#   repo:f7i-ai/f7i-gcp:pull_request
# (PR plans use :pull_request in `sub`, not :ref:refs/heads/dev — both are needed if you run PR + push.)
#
# GCS state: GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT_EMAIL (same as GCP Terraform).
# Prod: terraform-aws-prod-deploy.yml + aws/config/prod-accounts.json

name: Terraform AWS (dev apply)

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - "aws/terraform/**"
      - ".github/workflows/terraform-aws-deploy.yml"

concurrency:
  group: terraform-aws-apply-dev-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: terraform-apply-dev
    defaults:
      run:
        working-directory: aws/terraform

    steps:
      - uses: actions/checkout@v4

      - name: AWS dev context
        env:
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN_DEV }}
        run: |
          if [ -z "${ROLE_ARN}" ]; then
            echo "Set repository variable AWS_ROLE_ARN_DEV (GitHub OIDC role on branch dev)."
            exit 1
          fi
          echo "TF_ENV=dev" >> "$GITHUB_ENV"
          echo "TF_VAR_environment=dev" >> "$GITHUB_ENV"
          echo "AWS_ROLE_TO_ASSUME=${ROLE_ARN}" >> "$GITHUB_ENV"
          echo "BACKEND_FILE=$GITHUB_WORKSPACE/aws/terraform/env/aws-dev.backend.hcl" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Require backend fragment
        run: |
          if [ ! -f "${BACKEND_FILE}" ]; then
            echo "Missing $BACKEND_FILE"
            exit 1
          fi

      - name: Terraform Init
        run: terraform init -input=false -reconfigure -backend-config="$BACKEND_FILE"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Confirm no local state was written
        run: |
          if [ -f terraform.tfstate ] || [ -f terraform.tfstate.backup ]; then
            echo "Local state file present after apply; GCS backend must be used exclusively."
            exit 1
          fi
