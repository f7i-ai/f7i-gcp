# ============================================================================
# TEMPORARILY DISABLED (auto-triggers) — validate GCP first. Uncomment `push` under `on:` to re-enable.
# ============================================================================
# Push to `main` → matrix from aws/config/prod-accounts.json (one IAM role ARN per AWS account).
#
# In EACH prod account create the same role name (e.g. f7i-gcp-github-terraform) so ARNs only differ
# by account ID — see role_arn in aws/config/prod-accounts.json.
#
# --- GitHub → AWS (OIDC) per prod account ---
# Trust (example; use your real account IDs and repo slug f7i-ai/f7i-gcp):
#   "Federated": "arn:aws:iam::THIS_ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com"
#   "Action": "sts:AssumeRoleWithWebIdentity"
#   "Condition": {
#     "StringEquals": { "token.actions.githubusercontent.com:aud": "sts.amazonaws.com" },
#     "ForAnyValue:StringLike": {
#       "token.actions.githubusercontent.com:sub": [
#         "repo:f7i-ai/f7i-gcp:ref:refs/heads/main",
#         "repo:f7i-ai/f7i-gcp:pull_request"
#       ]
#     }
#   }
# Include :pull_request if terraform-aws-pr.yml plans against base `main`; omit if you only push to main.
# Optionally narrow further (environment claim) if you use GitHub Environments + attribute conditions in IAM.
#
# GCS: aws/terraform/env/aws-prod.bucket.hcl + prefix terraform/aws/prod/<matrix.key>/

name: Terraform AWS (prod apply)

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "aws/terraform/**"
  #     - "aws/config/prod-accounts.json"
  #     - ".github/workflows/terraform-aws-prod-deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Load prod account matrix
        id: set-matrix
        run: |
          echo "matrix<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          jq -c . aws/config/prod-accounts.json >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

  apply:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    environment: terraform-apply-prod
    concurrency:
      group: terraform-aws-prod-${{ matrix.key }}-${{ github.repository }}
      cancel-in-progress: false

    defaults:
      run:
        working-directory: aws/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Terraform context (prod / ${{ matrix.key }})
        run: |
          echo "TF_ENV=prod" >> "$GITHUB_ENV"
          echo "TF_VAR_environment=prod" >> "$GITHUB_ENV"
          echo "TF_VAR_account_key=${{ matrix.key }}" >> "$GITHUB_ENV"
          echo "STATE_PREFIX=terraform/aws/prod/${{ matrix.key }}" >> "$GITHUB_ENV"
          echo "AWS_ROLE_TO_ASSUME=${{ matrix.role_arn }}" >> "$GITHUB_ENV"
          echo "BUCKET_FILE=$GITHUB_WORKSPACE/aws/terraform/env/aws-prod.bucket.hcl" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Require GCS backend fragment
        run: |
          if [ ! -f "$BUCKET_FILE" ]; then
            echo "Missing $BUCKET_FILE"
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="$BUCKET_FILE" \
            -backend-config="prefix=${STATE_PREFIX}"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Confirm no local state was written
        run: |
          if [ -f terraform.tfstate ] || [ -f terraform.tfstate.backup ]; then
            echo "Local state file present after apply; GCS backend must be used exclusively."
            exit 1
          fi
