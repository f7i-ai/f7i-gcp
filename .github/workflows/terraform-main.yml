# GCP Terraform — applies on push to `dev` or `main` (prod project + prefix).
# `workflow_dispatch`: same branch → file selection as below.
#
# Per-environment values: Terraform-native files under terraform/env/
#   dev  → dev.tfvars + gcp-dev.backend.hcl
#   main → prod.tfvars + gcp-prod.backend.hcl
#
# GitHub → Actions → Variables:
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT_EMAIL — must access both GCP projects + both GCS state buckets
#
# GitHub Environments (optional): `terraform-apply-dev`, `terraform-apply-prod`.
# WIF in GCP must allow repository `f7i-ai/f7i-gcp` if you restrict claims.

name: Terraform GCP (apply)

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-main.yml"
  workflow_dispatch:

concurrency:
  group: terraform-gcp-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'terraform-apply-prod' || 'terraform-apply-dev' }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Select env files (dev vs main)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          WS="$GITHUB_WORKSPACE"
          case "$REF_NAME" in
            main)
              echo "TF_ENV=prod" >> "$GITHUB_ENV"
              echo "TFVARS_FILE=$WS/terraform/env/prod.tfvars" >> "$GITHUB_ENV"
              echo "BACKEND_FILE=$WS/terraform/env/gcp-prod.backend.hcl" >> "$GITHUB_ENV"
              ;;
            *)
              echo "TF_ENV=dev" >> "$GITHUB_ENV"
              echo "TFVARS_FILE=$WS/terraform/env/dev.tfvars" >> "$GITHUB_ENV"
              echo "BACKEND_FILE=$WS/terraform/env/gcp-dev.backend.hcl" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Require configuration
        env:
          WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          ok=1
          [ -f "${TFVARS_FILE:-}" ] || { echo "Missing tfvars: $TFVARS_FILE"; ok=0; }
          [ -f "${BACKEND_FILE:-}" ] || { echo "Missing backend fragment: $BACKEND_FILE"; ok=0; }
          [ -n "$WIF" ] || { echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER"; ok=0; }
          [ -n "$SA" ] || { echo "Missing GCP_SERVICE_ACCOUNT_EMAIL"; ok=0; }
          [ "$ok" -eq 1 ] || exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Terraform Init
        run: terraform init -input=false -reconfigure -backend-config="$BACKEND_FILE"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color -var-file="$TFVARS_FILE"

      - name: Confirm no local state was written
        run: test ! -f terraform.tfstate && test ! -f terraform.tfstate.backup
